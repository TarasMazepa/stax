name: dart-format.yml
on:
  workflow_dispatch:

jobs:
  dart-format:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: TarasMazepa/github-action-cat@main
        id: get-dart-version
        with:
          path: DART_SDK_VERSION
      - name: Cache Dart SDK
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/dart
          key: ${{ runner.os }}-dart-${{ steps.get-dart-version.outputs.text }}
          restore-keys: |
            ${{ runner.os }}-dart-
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ steps.get-dart-version.outputs.text }}
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache/hosted
            ~/.pub-cache/git
            ~/AppData/Local/Pub/Cache/hosted
            ~/AppData/Local/Pub/Cache/git
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - run: dart format .
        working-directory: cli
      - run: dart format .
        working-directory: ui
      - run: |
          if ! git diff --quiet; then
            branch_name=format-dart-code-in-${GITHUB_REF#refs/heads/}-branch-at-$(date -u +"%Y-%m-%dT%H-%M-%S")
            git config --global user.name 'stax'
            git config --global user.email 'stax@staxforgit.com'
            git checkout -b $branch_name
            git commit -a -m "Format dart code in ${GITHUB_REF#refs/heads/} branch"
            git push --set-upstream origin $branch_name
            gh pr merge $(gh pr create -B ${GITHUB_REF#refs/heads/} -f) --auto --squash
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT }} 
